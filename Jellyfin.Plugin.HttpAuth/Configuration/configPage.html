<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>HttpAuth</title>
</head>
<body>
        <div id="httpAuthConfigurationPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-select,emby-checkbox">
            <div data-role="content">
                <div class="content-primary">
                    <form id="httpAuthConfigurationForm">
                        <div class="checkboxContainer checkboxContainer-withDescription">
                            <label class="emby-checkbox-label">
                                <input id="chkEnablePlugin" name="chkEnablePlugin" type="checkbox" is="emby-checkbox" />
                                <span>Enable this plugin. By doing so, you acknowledge that your jellyfin instance will be vulnerable to anyone logging as an admin, unless you take the proper precaution with an proxy, and you know what you're doing.</span>
                            </label>
                        </div>
                        <div class="inputContainer">
                            <input is="emby-input" id="userHeader" label="HTTP Header containing user info" />
                            <div class="fieldDescription">HTTP Header containing user info.</div>
                        </div>
                        <div class="checkboxContainer checkboxContainer-withDescription">
                            <label class="emby-checkbox-label">
                                <input id="chkNewUsersAreAdmin" name="chkNewUsersAreAdmin" type="checkbox" is="emby-checkbox" />
                                <span>If checked, new users will be admin.</span>
                            </label>
                        </div>
                        <div>
                            <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                                <span>Save</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <script type="text/javascript">
                var HttpAuthConfigurationPage = {
                    pluginUniqueId: "d4866cb0-11fb-4f38-b1a5-1efbf870a94d",

                    loadConfiguration: function () {
                        Dashboard.showLoadingMsg();

                        ApiClient.getPluginConfiguration(HttpAuthConfigurationPage.pluginUniqueId).then(function (config) {
                            document.getElementById('chkEnablePlugin').checked = config.EnablePlugin;
                            document.getElementById('userHeader').value = config.UserHeader;
                            document.getElementById('chkNewUsersAreAdmin').checked = config.NewUsersAreAdmin;
                            Dashboard.hideLoadingMsg();
                        });
                    },

                    saveConfiguration: function () {
                        Dashboard.showLoadingMsg();

                        ApiClient.getPluginConfiguration(HttpAuthConfigurationPage.pluginUniqueId).then(function (config) {
                            config.EnablePlugin = document.getElementById('chkEnablePlugin').checked;
                            config.UserHeader = document.getElementById('userHeader').value;
                            config.NewUsersAreAdmin = document.getElementById('chkNewUsersAreAdmin').checked;

                            ApiClient.updatePluginConfiguration(HttpAuthConfigurationPage.pluginUniqueId, config).then(function (result) {
                                Dashboard.processPluginConfigurationUpdateResult(result);
                            });
                        });
                    },
                };

                document.getElementById('httpAuthConfigurationPage').addEventListener('pageshow', function () {
                    HttpAuthConfigurationPage.loadConfiguration();
                });

                document.getElementById('httpAuthConfigurationPage').addEventListener('submit', function (e) {
                    e.preventDefault();
                    HttpAuthConfigurationPage.saveConfiguration();
                });
            </script>
        </div>
    </body>
    </html>
